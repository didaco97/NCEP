services:
  postgres:
    image: postgres:16-alpine
    container_name: ncep-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-ncep_dev}
      POSTGRES_USER: ${POSTGRES_USER:-ncep_dev}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-ncep_dev_password}
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-ncep_dev} -d ${POSTGRES_DB:-ncep_dev}"]
      interval: 5s
      timeout: 5s
      retries: 12
    volumes:
      - ncep-postgres-data:/var/lib/postgresql/data

volumes:
  ncep-postgres-data:

